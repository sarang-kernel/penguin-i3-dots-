<touchégg>

  <settings>
    <property name="animation_delay">150</property>
    <property name="action_execute_threshold">20</property>
    <property name="color">auto</property>
  </settings>

  <application name="All">

    <!-- ========================= -->
    <!-- Workspace Switching (i3)  -->
    <!-- ========================= -->

    <!-- 3-finger swipe = switch workspace -->
    <gesture type="SWIPE" fingers="3" direction="LEFT">
      <action type="COMMAND">i3-msg workspace next</action>
    </gesture>

    <gesture type="SWIPE" fingers="3" direction="RIGHT">
      <action type="COMMAND">i3-msg workspace prev</action>
    </gesture>


    <!-- ========================= -->
    <!-- Browser / PDF Navigation  -->
    <!-- ========================= -->

    <!-- Back / Forward -->
    <!-- (Mac uses 2-finger swipe — not possible on X11 touchpad → use 4-finger) -->

    <gesture type="SWIPE" fingers="4" direction="LEFT">
      <action type="MOUSE_CLICK">
        <button>8</button>
        <on>begin</on>
      </action>
    </gesture>

    <gesture type="SWIPE" fingers="4" direction="RIGHT">
      <action type="MOUSE_CLICK">
        <button>9</button>
        <on>begin</on>
      </action>
    </gesture>


    <!-- ========================= -->
    <!-- Pinch Zoom                -->
    <!-- ========================= -->

    <!-- Works in browsers + most PDF viewers -->

    <gesture type="PINCH" fingers="2" direction="OUT">
      <action type="SEND_KEYS">
        <keys>Control_L+plus</keys>
      </action>
    </gesture>

    <gesture type="PINCH" fingers="2" direction="IN">
      <action type="SEND_KEYS">
        <keys>Control_L+minus</keys>
      </action>
    </gesture>


    <!-- ========================= -->
    <!-- Optional Extras           -->
    <!-- ========================= -->

    <!-- 3-finger swipe up = fullscreen toggle -->
    <gesture type="SWIPE" fingers="3" direction="UP">
      <action type="COMMAND">i3-msg fullscreen toggle</action>
    </gesture>

    <!-- 3-finger swipe down = floating toggle -->
    <gesture type="SWIPE" fingers="3" direction="DOWN">
      <action type="COMMAND">i3-msg floating toggle</action>
    </gesture>

  </application>

</touchégg>

