[module/network]
type = custom/script
exec = ~/.config/polybar/scripts/iwd-status.sh
interval = 5
label = %output%
; click-left = ~/.config/polybar/scripts/rofi-iwd-wifi-menu.sh

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

