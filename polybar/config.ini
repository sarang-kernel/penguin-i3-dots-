[colors]
background = ${colors.base}
background-alt = ${colors.blue}
foreground = ${colors.text}
primary = ${colors.mauve}
secondary = ${colors.mantle}
alert = ${colors.red}
disabled = ${colors.subtext1}

[bar/toph]
monitor = ${env:MONITOR:}
width = 100%
height = 28pt
radius = 0

background = ${colors.background}
foreground = ${colors.foreground}

bottom = true
line-size = 6pt

#border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.flamingo}

font-0 = MesloLGS Nerd Font Mono:size=14;6

modules-left = xworkspaces xwindow
modules-right = pulseaudio brightness battery memory cpu network mic date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/systray]
type = internal/tray

format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.mauve}
label-active-foreground = ${colors.crust}
label-active-underline= ${colors.lavender}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/brightness]
type = custom/script
exec = brightnessctl -d nvidia_wmi_ec_backlight get | awk '{printf "%d%%", $1*100/255}'
interval = 1
format = <label>
label = %output%

click-left = brightnessctl -d nvidia_wmi_ec_backlight set 100%
scroll-up = brightnessctl -d nvidia_wmi_ec_backlight set +5%
scroll-down = brightnessctl -d nvidia_wmi_ec_backlight set 5%-

[module/mic]
type = custom/script
exec = pactl get-source-mute @DEFAULT_SOURCE@ | awk '{print ($2=="yes")?"п„± Muted":"п„°"}'
interval = 1
format = <label>
label = %output%

click-left = pactl set-source-mute @DEFAULT_SOURCE@ toggle

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/battery]
type = internal/battery

battery = BAT0
adapter = AC0

poll-interval = 5
full-at = 99
low-at = 5

format-prefix = "BAT "
format-prefix-foreground = ${colors.primary}

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = п‰Ђ  <label-full>

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = Full

animation-charging-0 = п‰„
animation-charging-1 = п‰ѓ
animation-charging-2 = п‰‚
animation-charging-3 = п‰Ѓ
animation-charging-4 = п‰Ђ
animation-charging-framerate = 750
animation-charging-foreground = ${colors.peach}

ramp-capacity-0 = п‰„
ramp-capacity-1 = п‰ѓ
ramp-capacity-2 = п‰‚
ramp-capacity-3 = п‰Ѓ
ramp-capacity-4 = п‰Ђ

